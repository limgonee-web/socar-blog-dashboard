## 1. 문체 · 톤앤매너

**기본 원칙: 친구처럼 설명하고, 전문가처럼 정리한다**

쏘카 블로그의 독자는 설명서를 읽으러 오는 게 아니에요. "나한테 필요한 건지, 얼마나 편한 건지"를 빠르게 파악하고 싶어서 읽습니다. 그러니 복잡한 내용도 친한 친구가 카톡으로 설명해주듯 쉽고 간결하게, 하지만 핵심 정보는 빠짐없이 담아야 해요. 위트는 독자가 계속 읽게 만드는 동력이지, 정보를 희석하는 도구가 아닙니다.

**해야 할 것**
- 문장은 짧게. 한 문장에 하나의 메시지만 담는다.
- 독자를 맥락에 맞는 호칭으로 부른다. (ex. 쏘카 회원이라면, 자주 장거리를 운전하신다면)
- 어려운 용어는 괄호 안에 간단히 풀어 쓴다. (ex. 면책금(사고 시 본인 부담금))
- 능동형 문장을 쓴다. (~됩니다 → ~해요 / ~입니다)

**하지 말 것**
- 과장 표현 금지: "압도적", "혁신적", "세상에서 가장" 등
- 경쟁사 직접 언급 금지
- 단정적 법률·세금·보험 해석 금지 (반드시 "확인이 필요합니다" 표현 병기)
- 줄임말·은어 남용 금지 (맥락상 자연스럽지 않은 경우)

## 2. 아티클 구성 구조

### 서비스 설명 아티클
\`\`\`
[제목] 핵심 키워드 포함, 30자 이내
[리드 문장] 독자의 페인포인트 1~2문장으로 제시
[본문]
  - H2 소제목 2~4개로 내용 구분
  - 각 섹션 3~5문단
  - 필요 시 표·리스트 활용
[CTA] 쏘카 앱 이동 또는 관련 서비스 링크
\`\`\`

### 페르소나(유즈 케이스) 아티클
\`\`\`
[제목] 상황 + 쏘카 연결 (ex. "예비군 훈련 가는 날, 쏘카 쓰는 이유")
[리드 문장] 해당 상황을 겪는 독자 공감 유도
[본문]
  - 상황 묘사 → 문제 제기 → 쏘카 해결책 순서
  - 실제 이용 흐름(예약→이용→반납) 자연스럽게 녹이기
[CTA] 해당 상황에 맞는 쏘카 서비스 바로가기
\`\`\`

**공통 포맷 원칙**
- 문단 길이: 3~5줄 이내
- 소제목: H2 필수, 필요 시 H3 추가
- 본문 권장 분량: 800~1,500자

## 3. 팩트 확인 절차

**Step 1. 서비스 정보 확인**
쏘카 앱 또는 공식 홈페이지에서 직접 확인합니다.
- 요금·할인 정책, 존(Zone) 위치, 차종 정보 등은 반드시 최신 기준으로 작성

**Step 2. 수치·통계 출처 명시**
외부 데이터를 인용할 경우, 출처와 기준 연도를 반드시 병기합니다.
(ex. "2024년 국토교통부 통계 기준")

**Step 3. 법률·보험 관련 내용**
보험 약관, 법적 의무 등 민감한 내용은 단독 판단하지 않고 관련 부서 검토를 거칩니다.

**Step 4. 최종 교차 확인**
발행 전 동료 1인 이상이 내용을 교차 검토합니다.

## 4. SEO 작성 원칙

**제목(Title)**
- 핵심 키워드를 제목 앞쪽에 배치
- 30자 이내 권장
- 숫자·의문형 활용 시 클릭률 향상 효과 있음

**메타 디스크립션**
- 80~120자 이내
- 아티클 핵심 내용을 요약하고 클릭 유도 문구 포함

**본문 키워드**
- 핵심 키워드는 첫 문단, 소제목, 본문 전반에 자연스럽게 분산
- 키워드 밀도는 2~3% 유지 (억지 반복 금지)

**내부 링크**
- 관련 아티클 1개 이상 본문 내 자연스럽게 연결
- 앵커 텍스트는 "여기를 클릭" 대신 내용을 설명하는 문장으로

async function gasGet(action) {

  return res.json();
}
async function gasPost(action, data) {
  await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({ action, data }),
  });
}

// ── Markdown renderer ──
function renderInline(text) {
  return text.split(/(\*\*[^*]+\*\*)/).map((p,i) =>
    p.startsWith("**") && p.endsWith("**") ? <strong key={i}>{p.slice(2,-2)}</strong> : p
  );
}
function GuidelineView({ content }) {
  const lines = content.split("\n");
  let inCode=false, codeBuf=[], els=[];
  lines.forEach((line,i) => {
    if (line.startsWith("```")) {
      if (!inCode) { inCode=true; }
      else { els.push(<pre key={i} style={{background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:8,padding:14,fontSize:15,color:"#4b5563",margin:"14px 0",lineHeight:1.7}}>{codeBuf.join("\n")}</pre>); codeBuf=[]; inCode=false; }
      return;
    }
    if (inCode) { codeBuf.push(line); return; }
    if (line.startsWith("# "))  { els.push(<h1 key={i} style={{fontSize:26,fontWeight:700,color:"#111827",marginTop:24,marginBottom:12}}>{line.slice(2)}</h1>); return; }
    if (line.startsWith("## ")) { els.push(<h2 key={i} style={{fontSize:20,fontWeight:700,color:"#1f2937",marginTop:32,marginBottom:8,paddingBottom:6,borderBottom:"1px solid #e5e7eb"}}>{line.slice(3)}</h2>); return; }
    if (line.startsWith("### ")){ els.push(<h3 key={i} style={{fontSize:18,fontWeight:600,color:"#374151",marginTop:20,marginBottom:4}}>{line.slice(4)}</h3>); return; }
    if (line.startsWith("---")) { els.push(<hr key={i} style={{margin:"24px 0",borderColor:"#e5e7eb"}}/>); return; }
    if (line.startsWith("> "))  { els.push(<blockquote key={i} style={{borderLeft:`4px solid ${BRAND}`,paddingLeft:16,color:"#6b7280",fontStyle:"italic",margin:"8px 0",fontSize:16}}>{line.slice(2)}</blockquote>); return; }
    if (line.startsWith("- "))  { els.push(<li key={i} style={{marginLeft:20,fontSize:16,color:"#374151",lineHeight:1.8,listStyleType:"disc"}}>{renderInline(line.slice(2))}</li>); return; }
    if (/^\d+\.\s/.test(line))  { els.push(<li key={i} style={{marginLeft:20,fontSize:16,color:"#374151",lineHeight:1.8,listStyleType:"decimal"}}>{renderInline(line.replace(/^\d+\.\s/,""))}</li>); return; }
    if (line.startsWith("|")) {
      const cells = line.split("|").filter((_,ci) => ci>0 && ci<line.split("|").length-1).map(c=>c.trim());
      if (cells.every(c => /^-+$/.test(c))) return;
      els.push(<tr key={i}>{cells.map((c,ci)=><td key={ci} style={{border:"1px solid #e5e7eb",padding:"8px 14px",fontSize:15,color:"#374151"}}>{c}</td>)}</tr>);
      return;
    }
    if (line.startsWith("**") && line.endsWith("**")) { els.push(<p key={i} style={{fontWeight:600,color:"#1f2937",marginTop:16,marginBottom:4,fontSize:16}}>{line.slice(2,-2)}</p>); return; }
    if (line === "") { els.push(<div key={i} style={{height:8}}/>); return; }
    els.push(<p key={i} style={{fontSize:16,color:"#374151",lineHeight:1.8,marginBottom:4}}>{renderInline(line)}</p>);
  });
  const wrapped=[]; let trBuf=[];
  els.forEach((el,i) => {
    if (el.type==="tr") { trBuf.push(el); }
    else { if (trBuf.length){ wrapped.push(<table key={"t"+i} style={{borderCollapse:"collapse",width:"100%",margin:"14px 0"}}><tbody>{trBuf}</tbody></table>); trBuf=[]; } wrapped.push(el); }
  });
  if (trBuf.length) wrapped.push(<table key="tlast" style={{borderCollapse:"collapse",width:"100%",margin:"14px 0"}}><tbody>{trBuf}</tbody></table>);
  return <div style={{maxWidth:700,margin:"0 auto",padding:"16px 8px"}}>{wrapped}</div>;
}

  const {useState,useEffect}=React;
  const [articles,setArticles]=useState([]);
  const [issues,setIssues]=useState(DEFAULT_ISSUES);
  const [monthMemos,setMonthMemos]=useState({});
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [selectedTab,setSelectedTab]=useState(new Date().getMonth());
  const [editingId,setEditingId]=useState(null);
  const [showAddModal,setShowAddModal]=useState(false);
  const [newArticle,setNewArticle]=useState({publishDate:"",type:"서비스 설명",title:"",url:"",keyword:"",status:"🗂 기획",memo:"",month:null,noMonth:false});
  const [filterType,setFilterType]=useState("전체");
  const [filterStatus,setFilterStatus]=useState("전체");
  const [checklistArticle,setChecklistArticle]=useState(null);
  const [blockArticle,setBlockArticle]=useState(null);
  const [guidelineText,setGuidelineText]=useState(DEFAULT_GUIDELINE);
  const [editingGuide,setEditingGuide]=useState(false);
  const [guideDraft,setGuideDraft]=useState("");
  const [urlEditId,setUrlEditId]=useState(null);
  const [urlInput,setUrlInput]=useState("");
  const [memoSaved,setMemoSaved]=useState({});
  const [editDraft,setEditDraft]=useState({});
  const [editModal,setEditModal]=useState(null);
  const openEditModal=(a)=>{setEditDraft({...a});setEditModal(a);};

  useEffect(()=>{
    (async()=>{
      try {
        const [arts,iss,memos]=await Promise.all([gasGet("getArticles"),gasGet("getIssues"),gasGet("getMemos")]);
        if(arts&&arts.length) {
          setArticles(arts.map(a=>({...a,
            month: a.month===""||a.month===null?null:Number(a.month),
            noMonth: a.noMonth==="TRUE"||a.noMonth===true,
            checklist: typeof a.checklist==="string"&&a.checklist?JSON.parse(a.checklist):{}
          })));
        }
        if(iss&&iss.length) {
          const obj={...DEFAULT_ISSUES};
          iss.forEach(r=>{ if(r.month!=="") obj[Number(r.month)]=r.issueText; });
          setIssues(obj);
        }
        if(memos&&memos.length) {
          const obj={};
          memos.forEach(r=>{ if(r.month!=="") obj[Number(r.month)]=r.memoText; });
          setMonthMemos(obj);
        }
      } catch(e){ console.error("로드 실패",e); }
      setLoading(false);
    })();
  },[]);

  const saveArticles=async(data)=>{ setSaving(true); await gasPost("saveArticles",data.map(a=>({...a,checklist:JSON.stringify(a.checklist||{})}))); setSaving(false); };
  const saveIssues=async(data)=>{ await gasPost("saveIssues",Object.entries(data).map(([month,issueText])=>({month,issueText}))); };
  const saveMemo=async(month,text)=>{ const next={...monthMemos,[month]:text}; setMonthMemos(next); await gasPost("saveMemos",Object.entries(next).map(([m,memoText])=>({month:m,memoText}))); setMemoSaved(p=>({...p,[month]:true})); setTimeout(()=>setMemoSaved(p=>({...p,[month]:false})),2000); };

  const update=async(id,field,val)=>{ const next=articles.map(a=>a.id===id?{...a,[field]:val}:a); setArticles(next); await saveArticles(next); };
  const updateChecklist=async(id,cl)=>{ const next=articles.map(a=>a.id===id?{...a,checklist:cl}:a); setArticles(next); setChecklistArticle(p=>p?{...p,checklist:cl}:null); await saveArticles(next); };
  const deleteArticle=async(id)=>{ const next=articles.filter(a=>a.id!==id); setArticles(next); await saveArticles(next); };
  const addArticle=async()=>{
    const maxId=Math.max(0,...articles.map(a=>Number(a.id)||0));
    const month=newArticle.noMonth?null:(isMonthTab?selectedTab:(newArticle.month??0));
    const next=[...articles,{...newArticle,id:maxId+1,month,checklist:{}}];
    setArticles(next); await saveArticles(next);
    setShowAddModal(false);
    setNewArticle({publishDate:"",type:"서비스 설명",title:"",url:"",keyword:"",status:"🗂 기획",memo:"",month:null,noMonth:false});
  };
  const handleStatusChange=async(a,val)=>{
    if(val==="🚀 발행"&&Object.values(a.checklist||{}).filter(Boolean).length<CHECKLIST_ITEMS.length){setBlockArticle(a);return;}
    await update(a.id,"status",val);
  };
  const saveUrl=async(id)=>{ await update(id,"url",urlInput); setUrlEditId(null); };
  const updateIssue=async(month,text)=>{ const next={...issues,[month]:text}; setIssues(next); await saveIssues(next); };

  const isAllTab=selectedTab===12,isGuideTab=selectedTab===13,isMonthTab=selectedTab<=11;
  const monthArticles=articles.filter(a=>(isAllTab||isGuideTab||a.month===selectedTab)&&(filterType==="전체"||a.type===filterType)&&(filterStatus==="전체"||a.status===filterStatus));
  const sorted=[...monthArticles].sort((a,b)=>(b.publishDate||"").localeCompare(a.publishDate||""));
  const totalByStatus=s=>articles.filter(a=>(isAllTab||isGuideTab||a.month===selectedTab)&&a.status===s).length;

  // 드롭다운 공통 너비: 왼쪽(유형) 드롭다운 기준으로 통일
  const DROPDOWN_W = 120;

  if(loading) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}>
      <div style={{width:36,height:36,borderRadius:"50%",border:`4px solid #e5e7eb`,borderTopColor:BRAND,animation:"spin 0.8s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{fontSize:17,color:"#9ca3af"}}>데이터 불러오는 중...</div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#f9fafb",padding:20}}>
      {saving&&<div style={{position:"fixed",top:16,right:16,background:"#111827",color:"#fff",padding:"8px 16px",borderRadius:8,fontSize:15,zIndex:100}}>저장 중...</div>}

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28}}>
        <div style={{width:36,height:36,borderRadius:8,background:BRAND,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{color:"#fff",fontWeight:700,fontSize:16}}>S</span>
        </div>
        <div>
          <div style={{fontWeight:700,fontSize:22,color:"#111827"}}>쏘카 블로그 운영 캘린더</div>
          <div style={{fontSize:15,color:"#9ca3af"}}>월간 아티클 기획 및 발행 관리</div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:20}}>
        {[...MONTHS,"전체","가이드라인"].map((m,i)=>(
          <button key={i} onClick={()=>{setSelectedTab(i);setEditingGuide(false);}}
            style={{padding:"7px 14px",borderRadius:99,fontSize:15,fontWeight:500,cursor:"pointer",transition:"all 0.15s",
              background:selectedTab===i?(i===12?"#6366f1":i===13?"#0f766e":BRAND):"#fff",
              color:selectedTab===i?"#fff":"#4b5563",
              border:selectedTab===i?"none":"1px solid #e5e7eb"}}>
            {m}
          </button>
        ))}
      </div>

      {isGuideTab?(
        <div style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 28px",borderBottom:"1px solid #f3f4f6",background:"#f9fafb"}}>
            <span style={{fontSize:15,fontWeight:600,color:"#6b7280"}}>블로그 운영 가이드라인</span>
            {editingGuide?(
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setEditingGuide(false)} style={{fontSize:15,color:"#6b7280",border:"1px solid #e5e7eb",padding:"5px 14px",borderRadius:8,background:"#fff",cursor:"pointer"}}>취소</button>
                <button onClick={()=>{setGuidelineText(guideDraft);setEditingGuide(false);}} style={{fontSize:15,color:"#fff",background:BRAND,border:"none",padding:"5px 14px",borderRadius:8,fontWeight:600,cursor:"pointer"}}>저장</button>
              </div>
            ):(
              <button onClick={()=>{setGuideDraft(guidelineText);setEditingGuide(true);}} style={{fontSize:15,color:"#6b7280",border:"1px solid #e5e7eb",padding:"5px 14px",borderRadius:8,background:"#fff",cursor:"pointer"}}>✏️ 편집</button>
            )}
          </div>
          {editingGuide?(
            <textarea value={guideDraft} onChange={e=>setGuideDraft(e.target.value)}
              style={{width:"100%",padding:28,fontSize:15,color:"#374151",fontFamily:"monospace",lineHeight:1.7,outline:"none",border:"none",resize:"none",minHeight:"70vh"}}/>
          ):(
            <div style={{padding:"0 36px 28px",overflowY:"auto",maxHeight:"75vh"}}>
              <GuidelineView content={guidelineText}/>
            </div>
          )}
        </div>
      ):(
        <>
          {isMonthTab&&(
            <>
              <div style={{marginBottom:14}}>
                <IssueTag month={selectedTab} issues={issues} onSave={updateIssue}/>
              </div>
              <div style={{marginBottom:14,position:"relative"}}>
                <textarea value={monthMemos[selectedTab]||""} onChange={e=>setMonthMemos(p=>({...p,[selectedTab]:e.target.value}))}
                  placeholder="이달의 메모 (기획 방향, 공유 사항 등 자유롭게 작성)"
                  style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:12,padding:"14px 90px 14px 18px",fontSize:15,color:"#374151",background:"#fff",resize:"none",outline:"none",minHeight:80,lineHeight:1.7}}/>
                <div style={{position:"absolute",bottom:12,right:12,display:"flex",alignItems:"center",gap:8}}>
                  {memoSaved[selectedTab]&&<span style={{fontSize:14,color:"#9ca3af"}}>저장됨 ✓</span>}
                  <button onClick={()=>saveMemo(selectedTab,monthMemos[selectedTab]||"")}
                    style={{fontSize:15,color:"#fff",background:BRAND,border:"none",padding:"5px 14px",borderRadius:8,fontWeight:600,cursor:"pointer"}}>저장</button>
                </div>
              </div>
            </>
          )}

          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:16}}>
            {STATUS_OPTIONS.map(s=>(
              <div key={s} style={{borderRadius:8,padding:"10px 12px",textAlign:"center",...STATUS_STYLE[s]}}>
                <div style={{fontSize:22,fontWeight:700}}>{totalByStatus(s)}</div>
                <div style={{fontSize:15}}>{s}</div>
              </div>
            ))}
          </div>

          {/* Filters — 드롭다운 너비 통일 */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            {isMonthTab&&<>
              <select value={filterType} onChange={e=>setFilterType(e.target.value)}
                style={{fontSize:15,border:"1px solid #e5e7eb",borderRadius:8,padding:"7px 12px",background:"#fff",color:"#374151",width:DROPDOWN_W}}>
                <option>전체</option>{TYPE_OPTIONS.map(t=><option key={t}>{t}</option>)}
              </select>
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}
                style={{fontSize:15,border:"1px solid #e5e7eb",borderRadius:8,padding:"7px 12px",background:"#fff",color:"#374151",width:DROPDOWN_W}}>
                <option>전체</option>{STATUS_OPTIONS.map(s=><option key={s}>{s}</option>)}
              </select>
            </>}
            <button onClick={()=>setShowAddModal(true)} style={{marginLeft:"auto",fontSize:15,color:"#fff",background:BRAND,border:"none",padding:"7px 18px",borderRadius:8,fontWeight:600,cursor:"pointer"}}>+ 아티클 추가</button>
          </div>

          {isAllTab?(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              {TYPE_OPTIONS.map(type=>{
                const allTyped=articles.filter(a=>a.type===type);
                const noMonth=allTyped.filter(a=>a.noMonth);
                const withMonth=[...allTyped.filter(a=>!a.noMonth)].sort((a,b)=>(b.publishDate||"").localeCompare(a.publishDate||""));
                const typed=[...noMonth,...withMonth];
                return(
                  <div key={type} style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
                    <div style={{padding:"12px 18px",borderBottom:"1px solid #f3f4f6",background:type==="서비스 설명"?"#faf5ff":type==="페르소나"?"#fff7ed":"#f0f9ff",display:"flex",alignItems:"center",gap:8}}>
                      <span style={{padding:"3px 10px",borderRadius:99,fontSize:15,fontWeight:600,...TYPE_STYLE[type]}}>{type}</span>
                      <span style={{fontSize:15,color:"#9ca3af"}}>{typed.length}편</span>
                      {noMonth.length>0&&<span style={{fontSize:14,color:"#9ca3af"}}>(미정 {noMonth.length}편 포함)</span>}
                    </div>
                    <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
                      <colgroup><col style={{width:36}}/><col style={{width:46}}/><col/><col style={{width:110}}/></colgroup>
                      <thead>
                        <tr style={{background:"#f9fafb",borderBottom:"1px solid #f3f4f6"}}>
                          {["No","월","제목","상태"].map(h=><th key={h} style={{textAlign:"center",padding:"9px 12px",fontSize:15,fontWeight:600,color:"#9ca3af",whiteSpace:"nowrap"}}>{h}</th>)}
                        </tr>
                      </thead>
                      <tbody>
                        {typed.length===0?<tr><td colSpan={4} style={{textAlign:"center",padding:36,fontSize:15,color:"#9ca3af"}}>아티클 없음</td></tr>
                        :typed.map((a,i)=>{
                          const isP=a.status==="🚀 발행";
                          return(
                            <tr key={a.id} onClick={()=>!isP&&openEditModal(a)}
                              style={{borderBottom:"1px solid #f9fafb",background:isP?"#f9fafb":a.noMonth?"#eff6ff":"#fff",cursor:isP?"default":"pointer"}}
                              onMouseEnter={e=>{if(!isP)e.currentTarget.style.background="#f0f7ff";}}
                              onMouseLeave={e=>{e.currentTarget.style.background=isP?"#f9fafb":a.noMonth?"#eff6ff":"#fff";}}>
                              <td style={{padding:"9px 12px",fontSize:15,textAlign:"center",color:"#9ca3af"}}>{i+1}</td>
                              <td style={{padding:"9px 12px",fontSize:15,textAlign:"center",color:isP?"#d1d5db":"#6b7280",whiteSpace:"nowrap"}}>{a.noMonth?<em style={{color:"#9ca3af"}}>미정</em>:MONTHS[a.month]}</td>
                              <td style={{padding:"9px 12px"}}>
                                {isP&&a.url
                  ?<a href={a.url} target="_blank" rel="noreferrer" style={{fontSize:15,fontWeight:500,color:"#9ca3af",textDecoration:"none"}}>{a.title}</a>
                  :<span style={{fontSize:15,fontWeight:500,color:isP?"#9ca3af":"#111827"}}>{a.title}</span>}
                              </td>
                              <td style={{padding:"9px 12px",textAlign:"center"}}>
                                <select value={a.status} onClick={e=>e.stopPropagation()} onChange={e=>{if(e.target.value==="🚀 발행"&&Object.values(a.checklist||{}).filter(Boolean).length<CHECKLIST_ITEMS.length){setBlockArticle(a);return;}update(a.id,"status",e.target.value);}}
                                  style={{fontSize:15,borderRadius:99,padding:"3px 6px",border:"none",fontWeight:600,cursor:"pointer",width:"100%",...STATUS_STYLE[a.status]}}>
                                  {STATUS_OPTIONS.map(s=><option key={s}>{s}</option>)}
                                </select>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                );
              })}
            </div>
          ):(
            <div style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
              <div style={{overflowX:"auto"}}>
                {/* 아티클 제목 열 절반으로 줄이고, 키워드·메모 늘림 */}
                <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
                  <colgroup>
                    <col style={{width:100}}/>  {/* 발행일 */}
                    <col style={{width:110}}/>  {/* 유형 */}
                    <col style={{width:"33%"}}/> {/* 아티클 제목 — 50% 확대 */}
                    <col style={{width:"12%"}}/> {/* 핵심 키워드 — 축소 */}
                    <col style={{width:120}}/>  {/* 진행 상태 */}
                    <col style={{width:"18%"}}/> {/* 메모 */}
                    <col style={{width:52}}/>   {/* 액션 */}
                  </colgroup>
                  <thead>
                    <tr style={{background:"#f9fafb",borderBottom:"1px solid #e5e7eb"}}>
                      {["발행일","유형","아티클 제목","핵심 키워드","진행 상태","메모",""].map((h,i)=>(
                        <th key={i} style={{textAlign:"center",padding:"13px 12px",fontSize:15,fontWeight:600,color:"#9ca3af",whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {sorted.length===0?<tr><td colSpan={7} style={{textAlign:"center",padding:48,color:"#9ca3af",fontSize:17}}>아티클이 없습니다.</td></tr>
                    :sorted.map(a=>{
                      const isP=a.status==="🚀 발행";
                      const doneCount=Object.values(a.checklist||{}).filter(Boolean).length;
                      const allDone=doneCount===CHECKLIST_ITEMS.length;
                      return(
                        <tr key={a.id}
                          onClick={()=>!isP&&openEditModal(a)}
                          onMouseEnter={e=>{if(!isP)e.currentTarget.style.background="#f0f7ff";}}
                          onMouseLeave={e=>{e.currentTarget.style.background=isP?"#f9fafb":"#fff";}}
                          style={{borderBottom:"1px solid #f3f4f6",background:isP?"#f9fafb":"#fff",cursor:isP?"default":"pointer"}}>
                          <td style={{padding:"11px 12px",textAlign:"center",whiteSpace:"nowrap"}}>
                            <span style={{fontSize:15,color:isP?"#9ca3af":"#4b5563"}}>{a.publishDate?a.publishDate.slice(0,10):"-"}</span>
                          </td>
                          <td style={{padding:"11px 12px",textAlign:"center"}}>
                            <span style={{display:"inline-block",padding:"3px 10px",borderRadius:99,fontSize:15,fontWeight:500,whiteSpace:"nowrap",...(isP?{background:"#f3f4f6",color:"#9ca3af"}:TYPE_STYLE[a.type])}}>{a.type}</span>
                          </td>
                          <td style={{padding:"11px 12px"}}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              {isP&&a.url
                                ?<a href={a.url} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{fontSize:15,fontWeight:500,color:"#9ca3af",textDecoration:"none"}}>{a.title}</a>
                                :<span style={{fontSize:15,fontWeight:500,color:isP?"#9ca3af":"#111827"}}>{a.title}</span>}
                              <button onClick={e=>{e.stopPropagation();setChecklistArticle(a);}}
                                style={{fontSize:14,padding:"3px 8px",borderRadius:99,border:`1px solid ${allDone?"#86efac":doneCount>0?"#93c5fd":"#e5e7eb"}`,
                                  background:allDone?"#f0fdf4":doneCount>0?"#eff6ff":"#f9fafb",
                                  color:allDone?"#166534":doneCount>0?"#1d4ed8":"#9ca3af",cursor:"pointer",flexShrink:0,fontWeight:500}}>
                                {allDone?"✅":doneCount>0?`☑ ${doneCount}/${CHECKLIST_ITEMS.length}`:"☑ 체크"}
                              </button>
                            </div>
                          </td>
                          <td style={{padding:"11px 12px"}}>
                            <span style={{fontSize:15,color:isP?"#9ca3af":"#6b7280"}}>{a.keyword}</span>
                          </td>
                          <td style={{padding:"11px 12px",textAlign:"center",whiteSpace:"nowrap"}}>
                            <select value={a.status} onClick={e=>e.stopPropagation()} onChange={e=>handleStatusChange(a,e.target.value)}
                              style={{fontSize:15,borderRadius:99,padding:"5px 10px",border:"none",fontWeight:600,cursor:"pointer",...STATUS_STYLE[a.status]}}>
                              {STATUS_OPTIONS.map(s=><option key={s}>{s}</option>)}
                            </select>
                          </td>
                          <td style={{padding:"11px 12px"}}>
                            <span style={{fontSize:15,color:"#9ca3af",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{a.memo||"-"}</span>
                          </td>
                          <td style={{padding:"11px 12px",textAlign:"center",whiteSpace:"nowrap"}}>
                            <button onClick={e=>{e.stopPropagation();deleteArticle(a.id);}} style={{color:"#d1d5db",background:"none",border:"none",cursor:"pointer",fontSize:16,padding:"0 3px"}}>✕</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </>
      )}

      {editModal&&(
    <div onClick={()=>setEditModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50,padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,boxShadow:"0 20px 60px rgba(0,0,0,0.15)",width:"100%",maxWidth:480,padding:28}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{fontSize:19,fontWeight:700,color:"#111827"}}>신규 아티클</h2>
          <button onClick={()=>setEditModal(null)} style={{color:"#9ca3af",fontSize:20,background:"none",border:"none",cursor:"pointer"}}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {/* 발행 월 */}
          <div>
            <label style={{fontSize:14,color:"#9ca3af",display:"block",marginBottom:5}}>발행 월</label>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <select disabled={editDraft.noMonth} value={editDraft.noMonth?"":(editDraft.month??0)} onChange={e=>setEditDraft(p=>({...p,month:Number(e.target.value)}))}
                style={{flex:1,border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:15,background:editDraft.noMonth?"#f9fafb":"#fff",color:editDraft.noMonth?"#9ca3af":"#374151"}}>
                {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
              </select>
              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:15,color:"#6b7280",cursor:"pointer",whiteSpace:"nowrap"}}>
                <input type="checkbox" checked={!!editDraft.noMonth} onChange={e=>setEditDraft(p=>({...p,noMonth:e.target.checked,month:e.target.checked?null:0}))}/>
                월 미정
              </label>
            </div>
          </div>
          {/* 발행 예정일 */}
          <div>
            <label style={{fontSize:14,color:"#9ca3af",display:"block",marginBottom:5}}>발행 예정일</label>
            <input type="date" disabled={editDraft.noMonth} value={editDraft.publishDate||""} onChange={e=>setEditDraft(p=>({...p,publishDate:e.target.value}))}
              style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:15,background:editDraft.noMonth?"#f9fafb":"#fff"}}/>
          </div>
          {/* 제목 */}
          <div>
            <label style={{fontSize:14,color:"#9ca3af",display:"block",marginBottom:5}}>아티클 제목</label>
            <input value={editDraft.title||""} onChange={e=>setEditDraft(p=>({...p,title:e.target.value}))}
              style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:15}}/>
          </div>
          {/* URL */}
          <div>
            <label style={{fontSize:14,color:"#9ca3af",display:"block",marginBottom:5}}>URL</label>
            <input value={editDraft.url||""} onChange={e=>setEditDraft(p=>({...p,url:e.target.value}))} placeholder="https://"
              style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:15}}/>
          </div>
          {/* 유형 */}
          <div>
            <label style={{fontSize:14,color:"#9ca3af",display:"block",marginBottom:5}}>유형</label>
            <select value={editDraft.type||"서비스 설명"} onChange={e=>setEditDraft(p=>({...p,type:e.target.value}))}
              style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:15}}>
              {TYPE_OPTIONS.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          {/* 핵심 키워드 */}
          <div>
            <label style={{fontSize:14,color:"#9ca3af",display:"block",marginBottom:5}}>핵심 키워드</label>
            <input value={editDraft.keyword||""} onChange={e=>setEditDraft(p=>({...p,keyword:e.target.value}))} placeholder="ex. 보험, 드라이브"
              style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:15}}/>
          </div>
          {/* 진행 상태 */}
          <div>
            <label style={{fontSize:14,color:"#9ca3af",display:"block",marginBottom:5}}>진행 상태</label>
            <select value={editDraft.status||"🗂 기획"} onChange={e=>setEditDraft(p=>({...p,status:e.target.value}))}
              style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:15}}>
              {STATUS_OPTIONS.filter(s=>s!=="🚀 발행").map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          {/* 메모 */}
          <div>
            <label style={{fontSize:14,color:"#9ca3af",display:"block",marginBottom:5}}>메모</label>
            <textarea value={editDraft.memo||""} onChange={e=>setEditDraft(p=>({...p,memo:e.target.value}))} placeholder="참고사항 등"
              style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:15,resize:"vertical",minHeight:180,lineHeight:1.7}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:24}}>
          <button onClick={()=>setEditModal(null)} style={{flex:1,border:"1px solid #e5e7eb",borderRadius:8,padding:"11px 0",fontSize:15,color:"#6b7280",background:"#fff",cursor:"pointer"}}>취소</button>
          <button onClick={async()=>{
            const next=articles.map(a=>a.id===editDraft.id?{...a,...editDraft}:a);
            setArticles(next); await saveArticles(next); setEditModal(null);
          }} style={{flex:1,background:BRAND,color:"#fff",border:"none",borderRadius:8,padding:"11px 0",fontSize:15,fontWeight:600,cursor:"pointer"}}>저장</button>
        </div>
      </div>
    </div>
  )}

  {checklistArticle&&<ChecklistModal article={checklistArticle} onClose={()=>setChecklistArticle(null)} onUpdate={updateChecklist}/>}
      {blockArticle&&<BlockModal onClose={()=>setBlockArticle(null)} onOpenChecklist={()=>{setChecklistArticle(blockArticle);setBlockArticle(null);}}/>}

      {showAddModal&&(
        <div onClick={()=>setShowAddModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50,padding:16}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,boxShadow:"0 20px 60px rgba(0,0,0,0.15)",width:"100%",maxWidth:460,padding:28}}>
            <h2 style={{fontSize:20,fontWeight:700,color:"#111827",marginBottom:20}}>신규 아티클</h2>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div>
                <label style={{fontSize:15,color:"#9ca3af",display:"block",marginBottom:5}}>발행 월</label>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <select disabled={newArticle.noMonth} value={newArticle.noMonth?"":(newArticle.month??(isMonthTab?selectedTab:0))} onChange={e=>setNewArticle(p=>({...p,month:Number(e.target.value)}))}
                    style={{flex:1,border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:15,background:newArticle.noMonth?"#f9fafb":"#fff",color:newArticle.noMonth?"#9ca3af":"#374151"}}>
                    {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
                  </select>
                  <label style={{display:"flex",alignItems:"center",gap:6,fontSize:15,color:"#6b7280",cursor:"pointer",whiteSpace:"nowrap"}}>
                    <input type="checkbox" checked={newArticle.noMonth} onChange={e=>setNewArticle(p=>({...p,noMonth:e.target.checked,month:e.target.checked?null:(isMonthTab?selectedTab:0)}))}/>
                    월 미정
                  </label>
                </div>
              </div>
              {[{label:"발행 예정일",field:"publishDate",inputType:"date"},{label:"아티클 제목",field:"title",ph:"제목을 입력하세요"},{label:"URL",field:"url",ph:"https://"},{label:"핵심 키워드",field:"keyword",ph:"ex. 보험, 드라이브"}].map(({label,field,inputType,ph})=>(
                <div key={field}>
                  <label style={{fontSize:15,color:"#9ca3af",display:"block",marginBottom:5}}>{label}</label>
                  <input type={inputType||"text"} disabled={field==="publishDate"&&newArticle.noMonth} value={newArticle[field]} onChange={e=>setNewArticle(p=>({...p,[field]:e.target.value}))} placeholder={ph}
                    style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:15,background:(field==="publishDate"&&newArticle.noMonth)?"#f9fafb":"#fff"}}/>
                </div>
              ))}
              <div>
                <label style={{fontSize:15,color:"#9ca3af",display:"block",marginBottom:5}}>메모</label>
                <textarea value={newArticle.memo} onChange={e=>setNewArticle(p=>({...p,memo:e.target.value}))} placeholder="참고사항 등"
                  style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:15,resize:"vertical",minHeight:180,lineHeight:1.7}}/>
              </div>
              <div>
                <label style={{fontSize:15,color:"#9ca3af",display:"block",marginBottom:5}}>유형</label>
                <select value={newArticle.type} onChange={e=>setNewArticle(p=>({...p,type:e.target.value}))} style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:15}}>
                  {TYPE_OPTIONS.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <div>
                <label style={{fontSize:15,color:"#9ca3af",display:"block",marginBottom:5}}>진행 상태</label>
                <select value={newArticle.status} onChange={e=>setNewArticle(p=>({...p,status:e.target.value}))} style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 12px",fontSize:15}}>
                  {STATUS_OPTIONS.filter(s=>s!=="🚀 발행").map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:24}}>
              <button onClick={()=>setShowAddModal(false)} style={{flex:1,border:"1px solid #e5e7eb",borderRadius:8,padding:"11px 0",fontSize:15,color:"#6b7280",background:"#fff",cursor:"pointer"}}>취소</button>
              <button onClick={addArticle} disabled={!newArticle.title} style={{flex:1,background:newArticle.title?BRAND:"#9ca3af",color:"#fff",border:"none",borderRadius:8,padding:"11px 0",fontSize:15,fontWeight:600,cursor:newArticle.title?"pointer":"not-allowed"}}>추가하기</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function IssueTag({month,issues,onSave}){
  const {useState}=React;
  const [editing,setEditing]=useState(false);
  const [input,setInput]=useState("");
  if(editing) return(
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <input value={input} onChange={e=>setInput(e.target.value)} autoFocus
        onKeyDown={e=>{if(e.key==="Enter"){onSave(month,input);setEditing(false);}}}
        style={{fontSize:15,border:"1px solid #f59e0b",borderRadius:99,padding:"5px 14px",background:"#fffbeb",color:"#92400e",outline:"none",width:240}}/>
      <button onClick={()=>{onSave(month,input);setEditing(false);}} style={{fontSize:15,color:"#fff",background:BRAND,border:"none",padding:"5px 14px",borderRadius:99,fontWeight:600,cursor:"pointer"}}>저장</button>
      <button onClick={()=>setEditing(false)} style={{fontSize:15,color:"#6b7280",border:"1px solid #e5e7eb",padding:"5px 10px",borderRadius:99,background:"#fff",cursor:"pointer"}}>취소</button>
    </div>
  );
  return(
    <button onClick={()=>{setInput(issues[month]);setEditing(true);}}
      style={{fontSize:15,background:"#fffbeb",border:"1px solid #fde68a",color:"#92400e",padding:"5px 14px",borderRadius:99,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
      <span>이달의 이슈: {issues[month]}</span><span>✏️</span>
    </button>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
